# Nginx configuration for serving the static portfolio site.
# Handles clean URLs (extensionless routes like /connect) and
# sets appropriate caching and content-type defaults.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location ~* \.(css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Try exact path, then path with .html extension, then directory index
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}
